<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Опрос</title>
<script src="https://st.max.ru/js/max-web-app.js"></script>
<style>
  :root {
    --bg: #0f0f13;
    --bg2: #18181f;
    --bg3: #22222c;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #f0f0f5;
    --text2: #9090a8;
    --accent: #7c6cfa;
    --accent2: #a78bfa;
    --success: #34d399;
    --danger: #f87171;
    --radius: 14px;
    --radius-sm: 8px;
    --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
    overflow-x: hidden;
  }

  /* ── Layout ── */
  .screen { display: none; flex-direction: column; min-height: 100vh; padding: 20px 16px 32px; }
  .screen.active { display: flex; }

  /* ── Header ── */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 28px;
  }
  .header-title { font-size: 20px; font-weight: 600; letter-spacing: -0.3px; }
  .header-sub { font-size: 13px; color: var(--text2); margin-top: 2px; }

  /* ── Card ── */
  .card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 12px;
  }

  /* ── Input ── */
  .field { margin-bottom: 16px; }
  .field label {
    display: block; font-size: 12px; font-weight: 500; color: var(--text2);
    letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 8px;
  }
  .input {
    width: 100%; background: var(--bg3); border: 1px solid var(--border2);
    border-radius: var(--radius-sm); padding: 12px 14px; color: var(--text);
    font-size: 15px; font-family: var(--font); outline: none;
    transition: border-color 0.2s;
  }
  .input:focus { border-color: var(--accent); }
  .input::placeholder { color: var(--text2); }
  textarea.input { resize: none; min-height: 52px; }

  /* ── Options list ── */
  .options-list { display: flex; flex-direction: column; gap: 8px; }
  .option-row {
    display: flex; align-items: center; gap: 8px;
  }
  .option-row .input { flex: 1; }
  .btn-icon {
    background: none; border: 1px solid var(--border2); border-radius: var(--radius-sm);
    color: var(--text2); width: 40px; height: 44px; cursor: pointer;
    font-size: 18px; display: flex; align-items: center; justify-content: center;
    transition: all 0.15s; flex-shrink: 0;
  }
  .btn-icon:hover { border-color: var(--danger); color: var(--danger); }
  .btn-add {
    background: none; border: 1px dashed var(--border2); border-radius: var(--radius-sm);
    color: var(--text2); padding: 10px; cursor: pointer; font-size: 14px;
    width: 100%; text-align: center; transition: all 0.15s; margin-top: 4px;
    font-family: var(--font);
  }
  .btn-add:hover { border-color: var(--accent); color: var(--accent2); }

  /* ── Toggle row ── */
  .toggle-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 0;
    border-bottom: 1px solid var(--border);
  }
  .toggle-row:last-child { border-bottom: none; padding-bottom: 0; }
  .toggle-label { font-size: 15px; }
  .toggle-desc { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .toggle {
    position: relative; width: 44px; height: 26px; flex-shrink: 0;
  }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle-track {
    position: absolute; inset: 0; border-radius: 13px;
    background: var(--bg3); border: 1px solid var(--border2);
    transition: all 0.2s; cursor: pointer;
  }
  .toggle input:checked ~ .toggle-track { background: var(--accent); border-color: var(--accent); }
  .toggle-knob {
    position: absolute; top: 3px; left: 3px; width: 18px; height: 18px;
    background: white; border-radius: 50%; transition: transform 0.2s;
    pointer-events: none;
  }
  .toggle input:checked ~ .toggle-knob { transform: translateX(18px); }

  /* ── Primary button ── */
  .btn-primary {
    background: var(--accent); color: white; border: none; border-radius: var(--radius-sm);
    padding: 15px 20px; font-size: 16px; font-weight: 600; cursor: pointer;
    width: 100%; font-family: var(--font); letter-spacing: -0.2px;
    transition: opacity 0.15s, transform 0.1s;
  }
  .btn-primary:active { transform: scale(0.98); opacity: 0.9; }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-outline {
    background: none; color: var(--accent2); border: 1px solid var(--border2);
    border-radius: var(--radius-sm); padding: 14px 20px; font-size: 15px;
    font-weight: 500; cursor: pointer; width: 100%; font-family: var(--font);
    transition: border-color 0.15s;
  }
  .btn-outline:hover { border-color: var(--accent); }

  /* ── Poll question header ── */
  .poll-question {
    font-size: 18px; font-weight: 600; line-height: 1.4;
    letter-spacing: -0.3px; margin-bottom: 6px;
  }
  .poll-meta { font-size: 13px; color: var(--text2); }

  /* ── Vote options ── */
  .vote-options { display: flex; flex-direction: column; gap: 10px; margin: 20px 0; }
  .vote-option {
    position: relative; cursor: pointer;
    border: 1.5px solid var(--border2); border-radius: var(--radius-sm);
    padding: 13px 14px; transition: border-color 0.15s; overflow: hidden;
    user-select: none;
  }
  .vote-option .bar {
    position: absolute; inset: 0; background: rgba(124,108,250,0.12);
    transform-origin: left; transform: scaleX(0); transition: transform 0.5s ease;
    border-radius: var(--radius-sm);
  }
  .vote-option.selected { border-color: var(--accent); }
  .vote-option .option-content {
    position: relative; display: flex; align-items: center; gap: 10px;
  }
  .vote-option .option-check {
    width: 18px; height: 18px; border-radius: 50%; border: 1.5px solid var(--border2);
    flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .vote-option.multiple .option-check { border-radius: 4px; }
  .vote-option.selected .option-check {
    background: var(--accent); border-color: var(--accent); color: white;
  }
  .option-check::after {
    content: ''; display: none;
    width: 6px; height: 6px; border-radius: 50%; background: white;
  }
  .vote-option.selected:not(.multiple) .option-check::after { display: block; }
  .vote-option.selected.multiple .option-check::after {
    display: block; width: 10px; height: 6px; border-radius: 0;
    background: none; border-bottom: 2px solid white; border-right: 2px solid white;
    transform: rotate(45deg) translate(-1px,-2px);
  }
  .option-text { font-size: 15px; line-height: 1.3; flex: 1; }
  .option-pct {
    font-size: 13px; font-weight: 600; color: var(--text2); min-width: 36px; text-align: right;
  }

  /* ── Results ── */
  .result-item { margin-bottom: 14px; }
  .result-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
  .result-name { font-size: 14px; }
  .result-pct { font-size: 14px; font-weight: 600; color: var(--accent2); }
  .progress-track { background: var(--bg3); border-radius: 4px; height: 6px; overflow: hidden; }
  .progress-fill {
    height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 4px; transition: width 0.6s ease; width: 0;
  }
  .result-votes { font-size: 12px; color: var(--text2); margin-top: 4px; }
  .result-voters { font-size: 12px; color: var(--text2); font-style: italic; }

  /* ── Voters list ── */
  .voters-section { margin-top: 20px; }
  .voters-title { font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text2); margin-bottom: 10px; }
  .voter-chip {
    display: inline-block; background: var(--bg3); border: 1px solid var(--border);
    border-radius: 20px; padding: 4px 10px; font-size: 12px; margin: 3px;
  }

  /* ── Toast ── */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(100px);
    background: var(--bg3); border: 1px solid var(--border2); border-radius: var(--radius-sm);
    padding: 12px 20px; font-size: 14px; white-space: nowrap;
    transition: transform 0.3s ease; z-index: 100;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.success { border-color: var(--success); color: var(--success); }
  .toast.error { border-color: var(--danger); color: var(--danger); }

  /* ── Loading ── */
  .spinner {
    display: inline-block; width: 20px; height: 20px;
    border: 2px solid var(--border2); border-top-color: var(--accent);
    border-radius: 50%; animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-center {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 12px; color: var(--text2);
  }

  /* ── Badge ── */
  .badge {
    display: inline-block; font-size: 11px; font-weight: 500; padding: 3px 8px;
    border-radius: 20px; letter-spacing: 0.3px;
  }
  .badge-anon { background: rgba(124,108,250,0.15); color: var(--accent2); }
  .badge-multi { background: rgba(52,211,153,0.12); color: var(--success); }

  .spacer { flex: 1; }
  .gap-8 { height: 8px; }
  .gap-16 { height: 16px; }

  .total-votes { font-size: 13px; color: var(--text2); text-align: right; margin-bottom: 16px; }

  /* ── Detail screen ── */
  .detail-option-header {
    font-size: 13px; font-weight: 600; color: var(--accent2);
    text-transform: uppercase; letter-spacing: 0.5px;
    padding: 14px 0 8px; border-top: 1px solid var(--border);
    margin-top: 4px;
  }
  .detail-option-header:first-child { border-top: none; padding-top: 0; }
  .detail-option-pct { color: var(--text2); font-weight: 400; margin-left: 6px; }
  .voter-row {
    display: flex; align-items: center; gap: 12px;
    padding: 8px 0; border-bottom: 1px solid var(--border);
  }
  .voter-row:last-child { border-bottom: none; }
  .voter-avatar {
    width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0;
    background: var(--accent); display: flex; align-items: center;
    justify-content: center; font-size: 14px; font-weight: 600; color: white;
  }
  .voter-info { flex: 1; }
  .voter-name { font-size: 14px; }
  .voter-time { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .no-voters { font-size: 14px; color: var(--text2); padding: 12px 0; }
</style>
</head>
<body>

<!-- ══════════════════════════════════════════════════════════ -->
<!-- ЭКРАН 1: Создание опроса                                  -->
<!-- ══════════════════════════════════════════════════════════ -->
<div class="screen active" id="screen-create">
  <div class="header">
    <div>
      <div class="header-title">Новый опрос</div>
      <div class="header-sub">Заполни и опубликуй</div>
    </div>
  </div>

  <div class="card">
    <div class="field">
      <label>Вопрос</label>
      <textarea class="input" id="poll-question" rows="2" placeholder="Например: Когда проводим встречу?"></textarea>
    </div>
    <div class="field">
      <label>Варианты ответа</label>
      <div class="options-list" id="options-list">
        <div class="option-row">
          <input class="input" type="text" placeholder="Вариант 1">
          <button class="btn-icon" onclick="removeOption(this)">×</button>
        </div>
        <div class="option-row">
          <input class="input" type="text" placeholder="Вариант 2">
          <button class="btn-icon" onclick="removeOption(this)">×</button>
        </div>
      </div>
      <button class="btn-add" onclick="addOption()">+ Добавить вариант</button>
    </div>
  </div>

  <div class="card">
    <div class="toggle-row">
      <div>
        <div class="toggle-label">Анонимное голосование</div>
        <div class="toggle-desc">Имена не показываются</div>
      </div>
      <label class="toggle">
        <input type="checkbox" id="opt-anonymous">
        <div class="toggle-track"></div>
        <div class="toggle-knob"></div>
      </label>
    </div>
    <div class="toggle-row">
      <div>
        <div class="toggle-label">Множественный выбор</div>
        <div class="toggle-desc">Можно выбрать несколько</div>
      </div>
      <label class="toggle">
        <input type="checkbox" id="opt-multiple">
        <div class="toggle-track"></div>
        <div class="toggle-knob"></div>
      </label>
    </div>
  </div>

  <div class="spacer"></div>
  <button class="btn-primary" id="btn-publish" onclick="publishPoll()">Опубликовать опрос</button>
</div>

<!-- ══════════════════════════════════════════════════════════ -->
<!-- ЭКРАН 2: Голосование                                      -->
<!-- ══════════════════════════════════════════════════════════ -->
<div class="screen" id="screen-vote">
  <div class="header">
    <div>
      <div class="header-title">Опрос</div>
      <div class="header-sub" id="vote-meta"></div>
    </div>
    <button class="btn-icon" onclick="showResults()" title="Результаты" style="width:40px;height:40px;font-size:16px">📊</button>
  </div>

  <div class="card">
    <div class="poll-question" id="vote-question"></div>
    <div class="gap-8"></div>
    <div id="vote-badges"></div>
  </div>

  <div class="vote-options" id="vote-options"></div>

  <div class="spacer"></div>
  <button class="btn-primary" id="btn-vote" onclick="submitVote()" disabled>Проголосовать</button>
  <div class="gap-8"></div>
  <button class="btn-outline" onclick="showResults()">Посмотреть результаты</button>
</div>

<!-- ══════════════════════════════════════════════════════════ -->
<!-- ЭКРАН 3: Результаты                                       -->
<!-- ══════════════════════════════════════════════════════════ -->
<div class="screen" id="screen-results">
  <div class="header">
    <div>
      <div class="header-title">Результаты</div>
      <div class="header-sub" id="results-meta"></div>
    </div>
    <div></div>
  </div>

  <div class="card">
    <div class="poll-question" id="results-question"></div>
    <div class="gap-8"></div>
    <div id="results-badges"></div>
  </div>

  <div class="card" id="results-list"></div>

  <div id="voters-section"></div>

  <div class="spacer"></div>
  <button class="btn-outline" onclick="goBack()">← Назад</button>
</div>

<!-- Detail screen: кто проголосовал -->
<div class="screen" id="screen-detail">
  <div class="header">
    <div>
      <div class="header-title">Кто голосовал</div>
      <div class="header-sub" id="detail-meta"></div>
    </div>
  </div>
  <div class="card" id="detail-list"></div>
  <div class="spacer"></div>
  <button class="btn-outline" onclick="showScreen('screen-results')">← К результатам</button>
</div>

<!-- Loading screen -->
<div class="screen" id="screen-loading">
  <div class="loading-center">
    <div class="spinner"></div>
    <div>Загрузка...</div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════════════════════
// CONFIG — замени на свои URL воркфлоу n8n
// ══════════════════════════════════════════════════════════
// Единый endpoint — action различает ветки
const API = 'https://script.google.com/macros/s/AKfycbxnvJA-VSuu5J9CeMTqYETT4ZVnN0iLO9ot5DM7W0c13db7wbmRdl3NkE9Em62XNShbeA/exec';

async function api(action, body) {
  const params = new URLSearchParams({
    action,
    data: JSON.stringify(body)
  });
  const res = await fetch(`${API}?${params}`, { method: 'GET' });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  const data = await res.json();
  if (!data.ok) throw new Error(data.error || 'server_error');
  return data;
}

// ══════════════════════════════════════════════════════════
// State
// ══════════════════════════════════════════════════════════
let currentUser = { id: null, name: 'Пользователь', username: '' };
let currentPoll = null;
let selectedOptions = new Set();
let prevScreen = 'screen-create';
// ══════════════════════════════════════════════════════════
// Init — MAX Bridge
// ══════════════════════════════════════════════════════════
function initApp() {
  try {
    const wa = window.WebApp;
    if (wa) {
      wa.ready();
      const u = wa.initDataUnsafe?.user;
      if (u) {
        currentUser = {
          id: String(u.id),
          name: [u.first_name, u.last_name].filter(Boolean).join(' ') || 'Аноним',
          username: u.username || '',
        };
      }
      // Если открыто с ?poll=ID — сразу идём голосовать
      const sp = wa.initDataUnsafe?.start_param;
      if (sp && sp.startsWith('poll_')) {
        loadPoll(sp);
        return;
      }
    }
  } catch(e) {}
  // Иначе — экран создания
  showScreen('screen-create');
}

// ══════════════════════════════════════════════════════════
// Navigation
// ══════════════════════════════════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function goBack() {
  showScreen(prevScreen === 'screen-vote' ? 'screen-vote' : 'screen-create');
}

// ══════════════════════════════════════════════════════════
// Toast
// ══════════════════════════════════════════════════════════
let toastTimer;
function toast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (type ? ' ' + type : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
}

// ══════════════════════════════════════════════════════════
// CREATE — добавить/удалить вариант
// ══════════════════════════════════════════════════════════
let optionCount = 2;

function addOption() {
  if (optionCount >= 10) { toast('Максимум 10 вариантов'); return; }
  optionCount++;
  const list = document.getElementById('options-list');
  const div = document.createElement('div');
  div.className = 'option-row';
  div.innerHTML = `<input class="input" type="text" placeholder="Вариант ${optionCount}">
    <button class="btn-icon" onclick="removeOption(this)">×</button>`;
  list.appendChild(div);
}

function removeOption(btn) {
  const rows = document.querySelectorAll('.option-row');
  if (rows.length <= 2) { toast('Минимум 2 варианта'); return; }
  btn.closest('.option-row').remove();
}

// ══════════════════════════════════════════════════════════
// CREATE — опубликовать
// ══════════════════════════════════════════════════════════
async function publishPoll() {
  const question = document.getElementById('poll-question').value.trim();
  const options = [...document.querySelectorAll('#options-list .input')]
    .map(i => i.value.trim()).filter(Boolean);
  const anonymous = document.getElementById('opt-anonymous').checked;
  const multiple  = document.getElementById('opt-multiple').checked;

  if (!question) { toast('Введи вопрос', 'error'); return; }
  if (options.length < 2) { toast('Нужно минимум 2 варианта', 'error'); return; }

  const btn = document.getElementById('btn-publish');
  btn.disabled = true;
  btn.textContent = 'Публикуем...';

  try {
    const params = new URLSearchParams({
      action: 'create',
      data: JSON.stringify({
        question, options, anonymous, multiple,
        creator_id:   currentUser.id,
        creator_name: currentUser.name,
      })
    });
    toast('Отправляем запрос...', '');
    const res = await fetch(`${API}?${params}`, { method: 'GET' });
    toast('Статус: ' + res.status, '');
    const data = await res.json();
    toast('Ответ: ' + JSON.stringify(data).slice(0, 50), '');
    
    if (!data.ok) throw new Error(data.error || 'server_error');
    
    currentPoll = data.poll;
    renderResults(data.poll);
    prevScreen = 'screen-create';
    showScreen('screen-results');
    toast('Опрос опубликован!', 'success');
  } catch(e) {
    toast('Ошибка: ' + e.message, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Опубликовать опрос';
  }
}

// ══════════════════════════════════════════════════════════
// LOAD POLL — загрузить опрос для голосования
// ══════════════════════════════════════════════════════════
async function loadPoll(pollId) {
  showScreen('screen-loading');
  try {
    const res = await api('get', { poll_id: pollId, user_id: currentUser.id });
    currentPoll = res.poll;
    renderVote(res.poll);
    prevScreen = 'screen-vote';
    showScreen('screen-vote');
  } catch(e) {
    toast('Не удалось загрузить опрос', 'error');
    showScreen('screen-create');
  }
}

// ══════════════════════════════════════════════════════════
// RENDER VOTE
// ══════════════════════════════════════════════════════════
function renderVote(poll) {
  selectedOptions.clear();
  document.getElementById('vote-question').textContent = poll.question;
  document.getElementById('vote-meta').textContent =
    `${poll.total_votes} ${pluralVotes(poll.total_votes)}`;

  const badges = document.getElementById('vote-badges');
  badges.innerHTML = '';
  if (poll.anonymous) badges.innerHTML += `<span class="badge badge-anon">Анонимное</span> `;
  if (poll.multiple)  badges.innerHTML += `<span class="badge badge-multi">Мультивыбор</span>`;

  const container = document.getElementById('vote-options');
  container.innerHTML = '';

  const alreadyVoted = poll.user_voted;

  poll.options.forEach((opt, i) => {
    const div = document.createElement('div');
    div.className = 'vote-option' + (poll.multiple ? ' multiple' : '');
    div.dataset.index = i;

    const pct = poll.total_votes > 0
      ? Math.round((poll.votes[i] || 0) / poll.total_votes * 100) : 0;

    div.innerHTML = `
      <div class="bar"></div>
      <div class="option-content">
        <div class="option-check"></div>
        <div class="option-text">${escHtml(opt)}</div>
        ${alreadyVoted ? `<div class="option-pct">${pct}%</div>` : ''}
      </div>`;

    if (alreadyVoted) {
      div.querySelector('.bar').style.transform = `scaleX(${pct/100})`;
      if (poll.user_choices && poll.user_choices.includes(i)) {
        div.classList.add('selected');
      }
    } else {
      div.addEventListener('click', () => toggleOption(div, i, poll.multiple));
    }
    container.appendChild(div);
  });

  const btn = document.getElementById('btn-vote');
  if (alreadyVoted) {
    btn.textContent = 'Уже проголосовал';
    btn.disabled = true;
  } else {
    btn.textContent = 'Проголосовать';
    btn.disabled = true;
  }
}

function toggleOption(div, index, multiple) {
  if (!multiple) {
    document.querySelectorAll('.vote-option').forEach(d => d.classList.remove('selected'));
    selectedOptions.clear();
  }
  if (selectedOptions.has(index)) {
    selectedOptions.delete(index);
    div.classList.remove('selected');
  } else {
    selectedOptions.add(index);
    div.classList.add('selected');
  }
  document.getElementById('btn-vote').disabled = selectedOptions.size === 0;
}

// ══════════════════════════════════════════════════════════
// SUBMIT VOTE
// ══════════════════════════════════════════════════════════
async function submitVote() {
  if (selectedOptions.size === 0) return;
  const btn = document.getElementById('btn-vote');
  btn.disabled = true;
  btn.textContent = 'Отправляем...';
  try {
    const res = await api('vote', {
      poll_id:     currentPoll.id,
      user_id:     currentUser.id,
      user_name:   currentUser.name,
      user_choices: [...selectedOptions],
    });
    currentPoll = res.poll;
    toast('Голос принят!', 'success');
    renderVote(res.poll);
  } catch(e) {
    toast('Ошибка при голосовании', 'error');
    btn.disabled = false;
    btn.textContent = 'Проголосовать';
  }
}

// ══════════════════════════════════════════════════════════
// SHOW RESULTS (переход со screen-vote)
// ══════════════════════════════════════════════════════════
async function showResults() {
  if (!currentPoll) return;
  showScreen('screen-loading');
  try {
    const res = await api('get', { poll_id: currentPoll.id, user_id: currentUser.id });
    currentPoll = res.poll;
    renderResults(res.poll);
    prevScreen = 'screen-vote';
    showScreen('screen-results');
  } catch(e) {
    toast('Ошибка загрузки', 'error');
    showScreen('screen-vote');
  }
}

// ══════════════════════════════════════════════════════════
// RENDER RESULTS
// ══════════════════════════════════════════════════════════
function renderResults(poll) {
  document.getElementById('results-question').textContent = poll.question;
  document.getElementById('results-meta').textContent =
    `${poll.total_votes} ${pluralVotes(poll.total_votes)}`;

  const badges = document.getElementById('results-badges');
  badges.innerHTML = '';
  if (poll.anonymous) badges.innerHTML += `<span class="badge badge-anon">Анонимное</span> `;
  if (poll.multiple)  badges.innerHTML += `<span class="badge badge-multi">Мультивыбор</span>`;

  const container = document.getElementById('results-list');
  container.innerHTML = `<div class="total-votes">${poll.total_votes} ${pluralVotes(poll.total_votes)}</div>`;

  poll.options.forEach((opt, i) => {
    const cnt = poll.votes[i] || 0;
    const pct = poll.total_votes > 0 ? Math.round(cnt / poll.total_votes * 100) : 0;
    const div = document.createElement('div');
    div.className = 'result-item';
    div.innerHTML = `
      <div class="result-header">
        <span class="result-name">${escHtml(opt)}</span>
        <span class="result-pct">${pct}%</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" data-pct="${pct}"></div>
      </div>
      <div class="result-votes">${cnt} ${pluralVotes(cnt)}</div>`;
    container.appendChild(div);
  });

  // animate bars after paint
  requestAnimationFrame(() => {
    document.querySelectorAll('.progress-fill').forEach(el => {
      el.style.width = el.dataset.pct + '%';
    });
  });

  // Кнопка "Подробнее" если не анонимный и есть голоса
  const vs = document.getElementById('voters-section');
  if (!poll.anonymous && poll.total_votes > 0 && poll.voters_by_option) {
    vs.innerHTML = '';
    const btn = document.createElement('button');
    btn.className = 'btn-outline';
    btn.style.marginTop = '4px';
    btn.textContent = 'Подробнее — кто проголосовал';
    btn.onclick = () => showDetail(poll);
    vs.appendChild(btn);
  } else {
    vs.innerHTML = '';
  }
}

// ══════════════════════════════════════════════════════════
// DETAIL — кто проголосовал
// ══════════════════════════════════════════════════════════
function showDetail(poll) {
  document.getElementById('detail-meta').textContent = poll.question;
  const container = document.getElementById('detail-list');
  container.innerHTML = '';

  const byOption = poll.voters_by_option || [];

  poll.options.forEach((opt, i) => {
    const voters = byOption[i] || [];
    const cnt = poll.votes[i] || 0;
    const pct = poll.total_votes > 0 ? Math.round(cnt / poll.total_votes * 100) : 0;

    const header = document.createElement('div');
    header.className = 'detail-option-header';
    header.innerHTML = `${escHtml(opt)} <span class="detail-option-pct">${pct}% · ${cnt} ${pluralVotes(cnt)}</span>`;
    container.appendChild(header);

    if (voters.length === 0) {
      const empty = document.createElement('div');
      empty.className = 'no-voters';
      empty.textContent = 'Никто не выбрал';
      container.appendChild(empty);
    } else {
      voters.forEach(v => {
        const initials = v.name.split(' ').map(w => w[0] || '').join('').slice(0, 2).toUpperCase();
        const colors = ['#7c6cfa','#34d399','#f87171','#fb923c','#60a5fa','#a78bfa','#4ade80'];
        const color  = colors[v.name.charCodeAt(0) % colors.length];
        const time   = v.voted_at ? formatVotedAt(v.voted_at) : '';

        const row = document.createElement('div');
        row.className = 'voter-row';
        row.innerHTML = `
          <div class="voter-avatar" style="background:${color}">${escHtml(initials)}</div>
          <div class="voter-info">
            <div class="voter-name">${escHtml(v.name)}</div>
            ${time ? `<div class="voter-time">${time}</div>` : ''}
          </div>`;
        container.appendChild(row);
      });
    }
  });

  showScreen('screen-detail');
}

function formatVotedAt(iso) {
  try {
    const d = new Date(iso);
    const day   = d.getDate();
    const month = ['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'][d.getMonth()];
    const hh    = String(d.getHours()).padStart(2,'0');
    const mm    = String(d.getMinutes()).padStart(2,'0');
    return `${day} ${month} ${hh}:${mm}`;
  } catch(e) { return ''; }
}

// ══════════════════════════════════════════════════════════
// SHARE
// ══════════════════════════════════════════════════════════
function shareResults() {
  if (!currentPoll || !window.WebApp) return;
  const lines = currentPoll.options.map((opt, i) => {
    const pct = currentPoll.total_votes > 0
      ? Math.round((currentPoll.votes[i]||0) / currentPoll.total_votes * 100) : 0;
    return `${opt}: ${pct}%`;
  });
  const text = `📊 ${currentPoll.question}\n\n${lines.join('\n')}\n\nВсего голосов: ${currentPoll.total_votes}`;
  try { window.WebApp.shareContent(text, ''); } catch(e) {}
}

// ══════════════════════════════════════════════════════════
// Helpers
// ══════════════════════════════════════════════════════════
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function pluralVotes(n) {
  const v = Math.abs(n) % 100;
  const v1 = v % 10;
  if (v >= 11 && v <= 19) return 'голосов';
  if (v1 === 1) return 'голос';
  if (v1 >= 2 && v1 <= 4) return 'голоса';
  return 'голосов';
}

// ══════════════════════════════════════════════════════════
// Boot
// ══════════════════════════════════════════════════════════
window.addEventListener('DOMContentLoaded', initApp);
</script>
